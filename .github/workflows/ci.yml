name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs uv. uv reads .python-version / requires-python and fetches the
      # matching Python itself, so we don't need a separate setup-python step.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (incl. dev group)
        run: uv sync

      - name: Run tests
        run: uv run pytest -v
